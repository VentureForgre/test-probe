name: container

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - Dockerfile
      - nginx.conf
      - .dockerignore
      - .github/workflows/container.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - homelab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/test-probe"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$image:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_main=$image:main" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sg docker -c 'docker login ghcr.io -u "${{ github.actor }}" --password-stdin'

      - name: Build
        shell: bash
        run: |
          sg docker -c 'docker build \
            --tag "${{ steps.meta.outputs.tag_sha }}" \
            --tag "${{ steps.meta.outputs.tag_main }}" \
            .'

      - name: Push
        shell: bash
        run: |
          sg docker -c 'docker push "${{ steps.meta.outputs.tag_sha }}"'
          sg docker -c 'docker push "${{ steps.meta.outputs.tag_main }}"'

      - name: Make package public
        shell: bash
        run: |
          curl --fail-with-body \
            --request PATCH \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --url "https://api.github.com/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/test-probe/visibility" \
            --data '{"visibility":"public"}'
