name: container

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - Dockerfile
      - nginx.conf
      - .dockerignore
      - .github/workflows/container.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - homelab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/test-probe"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$image:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_main=$image:main" >> "$GITHUB_OUTPUT"

      - name: Build and push in cluster
        shell: bash
        run: |
          set -euo pipefail

          namespace="github-builds"
          job="test-probe-build-${GITHUB_RUN_ID}"

          kubectl create namespace "$namespace" --dry-run=client -o yaml | kubectl apply -f -

          docker_auth="$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64 -w0)"
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: "$job-ghcr"
            namespace: "$namespace"
          type: kubernetes.io/dockerconfigjson
          stringData:
            .dockerconfigjson: |
              {"auths":{"ghcr.io":{"auth":"$docker_auth"}}}
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: "$job"
            namespace: "$namespace"
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.24.0
                    args:
                      - --context=git://github.com/${GITHUB_REPOSITORY}.git#refs/heads/main#${GITHUB_SHA}
                      - --dockerfile=Dockerfile
                      - --destination=${{ steps.meta.outputs.tag_sha }}
                      - --destination=${{ steps.meta.outputs.tag_main }}
                    volumeMounts:
                      - name: docker-config
                        mountPath: /kaniko/.docker
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        memory: 1Gi
                volumes:
                  - name: docker-config
                    secret:
                      secretName: "$job-ghcr"
                      items:
                        - key: .dockerconfigjson
                          path: config.json
          EOF

          kubectl -n "$namespace" wait --for=condition=complete "job/$job" --timeout=10m || {
            kubectl -n "$namespace" logs "job/$job"
            exit 1
          }

          kubectl -n "$namespace" logs "job/$job"
          kubectl -n "$namespace" delete job "$job" --ignore-not-found=true
          kubectl -n "$namespace" delete secret "$job-ghcr" --ignore-not-found=true
