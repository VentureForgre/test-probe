name: container

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - Dockerfile
      - nginx.conf
      - .dockerignore
      - .github/workflows/container.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - homelab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/test-probe"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$image:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_main=$image:main" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build
        shell: bash
        run: |
          sudo docker build \
            --tag "${{ steps.meta.outputs.tag_sha }}" \
            --tag "${{ steps.meta.outputs.tag_main }}" \
            .

      - name: Push
        shell: bash
        run: |
          sudo docker push "${{ steps.meta.outputs.tag_sha }}"
          sudo docker push "${{ steps.meta.outputs.tag_main }}"
