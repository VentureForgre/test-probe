apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-probe
  namespace: test-probe
  labels:
    app.kubernetes.io/name: test-probe
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: test-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: test-probe
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: app
          image: ghcr.io/ventureforgre/test-probe:main
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
